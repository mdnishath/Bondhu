<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bondhu — New chat</title>
<link rel="stylesheet" href="assets/bondhu.css" />
<style>
.app{grid-template-columns:72px 380px 1fr}
.nc-search{padding:4px 14px 10px}
.action-row{display:flex;align-items:center;gap:18px;padding:13px 22px;cursor:pointer;transition:.12s;border:none;background:transparent;width:100%;text-align:left;font-family:inherit}
.action-row:hover{background:var(--row-hover)}
.action-row .ico{width:46px;height:46px;border-radius:50%;flex:none;display:grid;place-items:center;
  background:var(--teal);color:#06291f}
.action-row .ico svg{width:23px;height:23px}
.action-row .t{font-size:15.5px;color:var(--txt);font-weight:500}
.group-letter{font-size:13px;font-weight:700;color:var(--teal);padding:14px 22px 6px;letter-spacing:.04em}
.contacts{flex:1;overflow-y:auto;min-height:0;padding-bottom:14px}
.crow{display:flex;align-items:center;gap:14px;padding:9px 22px;cursor:pointer;transition:.12s}
.crow:hover{background:var(--row-hover)}
.crow .av{width:46px;height:46px;font-size:17px;flex:none}
.crow .cn{font-size:15.5px;font-weight:500;color:var(--txt)}
.crow .cs{font-size:13px;color:var(--muted);margin-top:2px}
.section-head{padding:14px 22px 4px;font-size:13px;font-weight:600;color:var(--muted);letter-spacing:.03em}
</style>
</head>
<body>
<div class="app">
  <nav class="rail"></nav>

  <aside class="col">
    <div class="col-head">
      <a class="back icon-btn" href="Bondhu - Chat Client.html" title="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </a>
      <div class="col-title">New chat</div>
    </div>
    <div class="nc-search">
      <label class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="cSearch" placeholder="Search name or number" />
      </label>
    </div>

    <button class="action-row" onclick="showTip('New group — pick participants')">
      <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
      <span class="t">New group</span>
    </button>
    <button class="action-row" onclick="showTip('Add a new contact')">
      <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg></span>
      <span class="t">New contact</span>
    </button>
    <button class="action-row" onclick="showTip('Create a community')">
      <span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="3"/><path d="M3 9h18M8 4v5"/></svg></span>
      <span class="t">New community</span>
    </button>

    <div class="contacts scroll" id="contacts">
      <div class="section-head">Contacts on Bondhu</div>
      <!-- injected -->
    </div>
  </aside>

  <!-- empty pane -->
  <main class="pane">
    <div class="pane-tex"></div>
    <div class="empty">
      <div class="glyph">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M12 7v6M9 10h6"/></svg>
      </div>
      <h2>Start a new conversation</h2>
      <p>Select a contact to send your first message. Messages are end-to-end encrypted, and you can auto-translate replies into 90+ languages.</p>
    </div>
  </main>
</div>

<script src="assets/shell.js"></script>
<script>
renderRail();
const CONTACTS = [
  {n:"Anika Rahman", s:"Designing across languages 🌏", av:"AR", g:"linear-gradient(145deg,#00A884,#017a63)"},
  {n:"Aisha Khan", s:"Available", av:"AK", g:"linear-gradient(145deg,#f6b73c,#c2861a)"},
  {n:"Daniel O'Brien", s:"At the gym 💪", av:"DO", g:"linear-gradient(145deg,#39c46e,#15803d)"},
  {n:"Lena Müller", s:"Sleeping 😴", av:"LM", g:"linear-gradient(145deg,#6c7cff,#3b3fb0)"},
  {n:"Priya Sharma", s:"Busy", av:"PS", g:"linear-gradient(145deg,#e0479e,#8e1e63)"},
  {n:"Rafael Mendes", s:"Coffee first ☕", av:"RM", g:"linear-gradient(145deg,#f0883e,#b85c1f)"},
  {n:"Sofia Costa", s:"Hey there! I am using Bondhu.", av:"SC", g:"linear-gradient(145deg,#2bb3a3,#0c6e62)"},
  {n:"Tomás Herrera", s:"¡Hola! 👋", av:"TH", g:"linear-gradient(145deg,#2bb3a3,#0c6e62)"},
  {n:"Yuki Tanaka", s:"よろしく", av:"YT", g:"linear-gradient(145deg,#3aa0ff,#1a5fb4)"},
  {n:"Zara Ahmed", s:"On vacation 🏝️", av:"ZA", g:"linear-gradient(145deg,#b06cff,#6a2fb0)"},
];

const wrap = document.getElementById('contacts');
function render(list){
  let html = '<div class="section-head">Contacts on Bondhu</div>';
  let letter = '';
  list.forEach(c=>{
    const l = c.n[0].toUpperCase();
    if(l!==letter){ letter=l; html += `<div class="group-letter">${l}</div>`; }
    html += `<div class="crow" data-n="${c.n}">
      <div class="av" style="background:${c.g}">${c.av}</div>
      <div><div class="cn">${c.n}</div><div class="cs">${c.s}</div></div>
    </div>`;
  });
  wrap.innerHTML = html;
  wrap.querySelectorAll('.crow').forEach(r=>{
    r.addEventListener('click', ()=>{
      showTip('Opening chat with ' + r.dataset.n + '…');
      setTimeout(()=>location.href = HOME, 800);
    });
  });
}
render(CONTACTS);

document.getElementById('cSearch').addEventListener('input', e=>{
  const q = e.target.value.toLowerCase();
  render(CONTACTS.filter(c=>c.n.toLowerCase().includes(q)));
});
</script>
</body>
</html>
