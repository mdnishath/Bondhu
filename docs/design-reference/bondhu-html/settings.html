<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bondhu — Settings</title>
<link rel="stylesheet" href="assets/bondhu.css" />
<style>
.app{grid-template-columns:72px 380px 1fr}
.col-head .back{cursor:pointer}
.set-search{padding:4px 14px 12px}
.profile-card{display:flex;align-items:center;gap:18px;padding:18px 22px 22px;cursor:pointer;transition:.12s}
.profile-card:hover{background:var(--row-hover)}
.profile-card .av{width:64px;height:64px;font-size:24px;flex:none}
.profile-card .pc-name{font-size:18px;font-weight:600;color:var(--txt)}
.profile-card .pc-about{font-size:13.5px;color:var(--muted);margin-top:3px}
.set-list{flex:1;overflow-y:auto;min-height:0}

/* detail pane */
.pane{padding:0}
.detail{position:relative;z-index:1;flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:48px 24px}
.detail-inner{width:100%;max-width:560px}
.prof-hero{display:flex;flex-direction:column;align-items:center;gap:16px;margin-bottom:36px}
.prof-hero .av{width:160px;height:160px;font-size:58px;position:relative}
.prof-hero .cam{position:absolute;right:6px;bottom:6px;width:42px;height:42px;border-radius:50%;
  background:var(--teal);display:grid;place-items:center;border:4px solid var(--bg);cursor:pointer}
.prof-hero .cam svg{width:20px;height:20px;color:#06291f}
.fieldset{background:var(--panel);border-radius:14px;border:1px solid var(--line);overflow:hidden;margin-bottom:18px}
.editrow{padding:16px 20px}
.editrow + .editrow{border-top:1px solid var(--line)}
.editrow .lbl{font-size:12.5px;font-weight:600;color:var(--teal);margin-bottom:6px;display:flex;justify-content:space-between}
.editrow .lbl .edit{color:var(--muted);cursor:pointer}
.editrow .val{font-size:16px;color:var(--txt);display:flex;align-items:center;justify-content:space-between;gap:10px}
.editrow .val input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-size:16px;font-family:inherit}
.editrow .hint{font-size:12.5px;color:var(--muted);margin-top:5px}
.editrow .val .ic{color:var(--muted);cursor:pointer}
.pane-head{display:flex;align-items:center;gap:14px;padding:0 22px;height:60px;background:var(--panel);border-bottom:1px solid var(--line);position:relative;z-index:2}
.pane-head .t{font-size:16px;font-weight:600}
</style>
</head>
<body>
<div class="app">
  <nav class="rail"></nav>

  <!-- settings column -->
  <aside class="col">
    <div class="col-head">
      <a class="back icon-btn" href="Bondhu - Chat Client.html" title="Back to chats">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </a>
      <div class="col-title">Settings</div>
    </div>
    <div class="set-search">
      <label class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" placeholder="Search settings" />
      </label>
    </div>

    <div class="profile-card" id="profileCard">
      <div class="av" style="background:linear-gradient(145deg,#00A884,#015c4b)">MS</div>
      <div>
        <div class="pc-name">Maya Sengupta</div>
        <div class="pc-about">Designing across languages 🌏</div>
      </div>
    </div>
    <div class="divider"></div>

    <div class="set-list scroll" id="setList">
      <button class="set-row" data-d="account">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
        <span class="body"><span class="t">Account</span><span class="s">Security, two-step verification, change number</span></span>
        <span class="chev"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>
      </button>
      <button class="set-row" data-d="privacy">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 6v6c0 5 3.5 8 8 9 4.5-1 8-4 8-9V6z"/></svg></span>
        <span class="body"><span class="t">Privacy</span><span class="s">Last seen, blocked contacts, disappearing messages</span></span>
        <span class="chev"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>
      </button>
      <button class="set-row" data-d="chats">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
        <span class="body"><span class="t">Chats</span><span class="s">Theme, wallpaper, chat history</span></span>
        <span class="chev"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>
      </button>
      <button class="set-row" data-d="notif">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg></span>
        <span class="body"><span class="t">Notifications</span><span class="s">Message, group &amp; call tones</span></span>
        <span class="chev"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>
      </button>
      <a class="set-row" href="translation-settings.html">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18 14 14 0 0 1 0-18z"/></svg></span>
        <span class="body"><span class="t">Translation &amp; language</span><span class="s">Auto-translate · Bengali</span></span>
        <span class="chev"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>
      </a>
      <button class="set-row" data-d="storage">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 3 0 0 0 18 0V6a9 3 0 0 0-18 0zM3 6v6M21 6v6M3 12c0 1.7 4 3 9 3s9-1.3 9-3"/></svg></span>
        <span class="body"><span class="t">Storage and data</span><span class="s">Network usage, auto-download</span></span>
        <span class="chev"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>
      </button>
      <button class="set-row" data-d="help">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg></span>
        <span class="body"><span class="t">Help</span><span class="s">Help centre, contact us, terms &amp; privacy</span></span>
        <span class="chev"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>
      </button>
      <div class="divider"></div>
      <a class="set-row danger" href="login.html">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5M21 12H9"/></svg></span>
        <span class="body"><span class="t">Log out</span></span>
      </a>
    </div>
  </aside>

  <!-- detail pane: Profile -->
  <main class="pane">
    <div class="pane-head"><span class="t">Profile</span></div>
    <div class="pane-tex"></div>
    <div class="detail scroll">
      <div class="detail-inner">
        <div class="prof-hero">
          <div class="av" style="background:linear-gradient(145deg,#00A884,#017a63)">MS
            <span class="cam"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></span>
          </div>
        </div>

        <div class="fieldset">
          <div class="editrow">
            <div class="lbl">Your name <span class="edit">edit</span></div>
            <div class="val"><input value="Maya Sengupta" /></div>
            <div class="hint">This is not your username or PIN. This name will be visible to your contacts.</div>
          </div>
        </div>

        <div class="fieldset">
          <div class="editrow">
            <div class="lbl">About <span class="edit">edit</span></div>
            <div class="val"><input value="Designing across languages 🌏" /></div>
          </div>
        </div>

        <div class="fieldset">
          <div class="editrow">
            <div class="lbl">Phone</div>
            <div class="val">+880 1712-345678</div>
          </div>
          <div class="editrow">
            <div class="lbl">Connected accounts</div>
            <div class="val">3 active <span class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="assets/api.js"></script>
<script src="assets/shell.js"></script>
<script>
if (!API.requireAuth()) { /* redirected */ }

(async ()=>{
  await Shell.boot('settings');
  try {
    const me = await API.me();
    const nm = me.name || me.email;
    document.querySelectorAll('.pc-name').forEach(e=> e.textContent = nm);
    document.querySelectorAll('.prof-hero .av').forEach(e=>{ e.firstChild && (e.firstChild.textContent = initials(nm)); });
    const nameInput = document.querySelector('.fieldset input');
    if (nameInput) nameInput.value = nm;
    const pc = document.getElementById('profileCard');
    if (pc) { const av = pc.querySelector('.av'); if (av){ av.textContent = initials(nm); av.style.background = avatarGradient(me.id||nm); } }
  } catch(e){}
  // phone + connected count from accounts
  const acc = Shell.accounts.find(a=>a.id===API.account());
  const phoneVal = document.querySelectorAll('.editrow .val')[2];
  if (phoneVal && acc && acc.phone) phoneVal.textContent = '+' + acc.phone;
  const connVal = document.querySelectorAll('.editrow .val')[3];
  if (connVal) connVal.firstChild && (connVal.firstChild.textContent = Shell.accounts.length + ' active ');
})();

document.querySelectorAll('.set-list .set-row[data-d]').forEach(r=>{
  r.addEventListener('click', ()=> showTip(r.querySelector('.t').textContent + ' — coming soon'));
});

// Log out (clear token then go to login)
const logoutBtn = document.querySelector('.set-row.danger');
if (logoutBtn) logoutBtn.addEventListener('click', (e)=>{ e.preventDefault(); API.logout(); location.href='login.html'; });
</script>
</body>
</html>
